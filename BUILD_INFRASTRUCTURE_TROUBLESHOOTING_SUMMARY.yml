---
# HabitView Android APK Build Infrastructure Troubleshooting Summary
# Session: June 18, 2026 | Environment: Codespaces 8GB RAM

project_info:
  name: HabitView
  type: Flutter Mobile Application (Local-first Habit Tracker)
  target_platform: Android
  build_system: Gradle 8.14
  android_gradle_plugin: AGP 8.0+
  dart_version: "^3.10.7"
  flutter_version: ">=3.22.0"
  environment: GitHub Codespaces (8GB total RAM, ~7.8 GiB usable)

# ============================================================================
# SECTION 1: PROBLEM IDENTIFICATION & ROOT CAUSE ANALYSIS
# ============================================================================

initial_problem:
  primary_error: "Namespace not specified for library module"
  error_location: "/root/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/build.gradle"
  error_code: "com.android.builder.errors.EvalIssueException"
  
  root_cause: |
    Android Gradle Plugin (AGP) 8.0+ enforces that ALL library modules must explicitly 
    declare a namespace in their build.gradle configuration. The isar_flutter_libs 3.1.0+1 
    package (a plugin dependency) does not include this namespace declaration in its 
    bundled build.gradle file.
  
  requirement_details: |
    - AGP 8.0+ requires namespace declaration to determine the package name/applicationId
    - Previously (AGP <8.0), namespace could be inferred from AndroidManifest.xml
    - isar_flutter_libs is a precompiled binary plugin fetched from pub.dev
    - Package location: ~/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/build.gradle
    - File size: 512 bytes (minimal build.gradle with no namespace config)
  
  why_it_matters: |
    isar_flutter_libs provides native iOS/Android bindings for the local-first Isar database.
    It's a required dependency for the HabitView domain model persistence layer.
    Without it, the build cannot proceed to compile native Android code.

# ============================================================================
# SECTION 2: CASCADING PROBLEMS DISCOVERED DURING BUILD
# ============================================================================

problem_cascade:
  - sequence_number: 1
    primary_issue: "Namespace Not Specified (AGP 8.0+ Incompatibility)"
    timestamp: "Build attempt 1"
    status: "BLOCKING"
    failure_point: "Gradle configuration phase"
    error_message: "Namespace not specified. Specify a namespace in the module's build file"
    gradle_phase: "evaluateAllProjects()"
    
  - sequence_number: 2
    secondary_issue: "Java Desugaring Requirement (API Level Incompatibility)"
    timestamp: "After namespace patching attempt"
    status: "BLOCKING"
    failure_point: "AAR metadata validation (checkReleaseAarMetadata)"
    error_message: "Dependency 'flutter_local_notifications' requires core library desugaring to be enabled for :app"
    
    root_cause: |
      flutter_local_notifications v17.2.4 uses Java 8 APIs (java.time.* classes) which are
      not natively available on Android SDK < 26. To use Java 8 language features on older
      minSdkVersion targets, AGP requires core library desugaring to be explicitly enabled.
      
      Current app config:
        - minSdkVersion: 21 (set by Flutter, may be lower than required)
        - targetSdkVersion: dynamic from Flutter
        - flutter_local_notifications: ^17.2.4 (uses java.time APIs)
      
      Solution requires:
        - Enable desugaring in build.gradle configuration
        - Declare coreLibraryDesugaring dependency
        - Add d8/r8 configuration for bytecode transformation
    
    why_it_matters: |
      flutter_local_notifications is critical for the notification scheduling feature.
      Local habit reminders depend on this for ScheduledNotification implementation.
  
  - sequence_number: 3
    tertiary_issue: "Gradle Daemon OOM (Out of Memory) Crashes"
    timestamp: "After desugaring enabled"
    status: "CRITICAL"
    failure_point: "Gradle daemon process lifecycle"
    error_message: "Gradle daemon disappeared unexpectedly after approximately 8 minutes"
    
    root_cause: |
      Original gradle.properties configuration:
        - org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m
        - Total requested: ~12GB JVM heap + metaspace
        - System available: 8GB total, 1.1GB free at start
      
      Desugaring operation overhead:
        - d8/r8 bytecode transformation is memory-intensive
        - Processes all transitive dependencies' JAR/AAR files
        - Keeps ASM/CFR analysis data structures in memory
        - With 8GB constraint, daemon has insufficient heap
      
      Symptom sequence:
        1. Gradle daemon starts with -Xmx8G request
        2. Linux OOM killer detects memory pressure
        3. Daemon process is forcibly terminated
        4. Build fails with "daemon disappeared" error
        5. gradle.properties allocation still too aggressive for 8GB system
    
    why_it_matters: |
      8GB Codespaces environment is the target deployment. Build must succeed on this
      constrained hardware. Desktop development machine typically has 16GB+ RAM where
      the original settings worked, masking the issue.

# ============================================================================
# SECTION 3: SOLUTION ATTEMPTS & OUTCOMES
# ============================================================================

solution_attempts:
  attempt_1:
    number: 1
    approach: "Automatic Namespace Patching via Gradle plugins.withId()"
    files_modified:
      - android/build.gradle.kts
    implementation: |
      plugins.withId("com.android.library") {
          extensions.configure<com.android.build.gradle.LibraryExtension> {
              if (namespace == null) {
                  namespace = "com.example.habitview.${project.name}"
              }
          }
      }
    why_it_failed: |
      The plugins.withId() configuration is evaluated at build script parsing time,
      before dependency plugins are loaded from ~/.pub-cache. The isar_flutter_libs
      plugin hasn't been incorporated into the Gradle configuration yet at that point.
      Result: Namespace configuration never applied to the precompiled binary plugin.
    outcome: "UNSUCCESSFUL - Namespace error persisted"
    time_spent: "15 minutes"

  attempt_2:
    number: 2
    approach: "Gradle afterEvaluate Block for Late Binding"
    files_modified:
      - android/build.gradle.kts
    implementation: |
      afterEvaluate {
          if (plugins.hasPlugin("com.android.library")) {
              extensions.findByType<com.android.build.gradle.LibraryExtension>()?.let {
                  if (it.namespace == null) {
                      it.namespace = "com.example.habitview.${project.name}"
                  }
              }
          }
      }
    why_it_failed: |
      Same root cause as attempt 1. The afterEvaluate hook executes after subproject
      build scripts are parsed, but isar_flutter_libs is loaded from pub cache and
      its build.gradle is a static resource that was already processed. The framework
      validates namespace before afterEvaluate phase completes.
    outcome: "UNSUCCESSFUL - Namespace error persisted"
    time_spent: "10 minutes"

  attempt_3:
    number: 3
    approach: "Direct File Patching of isar_flutter_libs build.gradle"
    files_modified:
      - /root/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/build.gradle (direct patch)
      - android/app/build.gradle.kts (added coreLibraryDesugaring config)
      - android/gradle.properties (reduced JVM heap from -Xmx8G to -Xmx3G)
    implementation: |
      # Patched isar_flutter_libs build.gradle to add:
      android {
          namespace = "com.example.habitview.isar_flutter_libs"
          ...
      }
      
      # Added desugaring config in app/build.gradle.kts:
      compileOptions {
          sourceCompatibility = JavaVersion.VERSION_11
          targetCompatibility = JavaVersion.VERSION_11
          isCoreLibraryDesugaringEnabled = true
      }
      
      dependencies {
          coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
      }
      
      # Reduced memory in gradle.properties:
      org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m
    outcome: "PARTIAL SUCCESS - Namespace fixed, desugaring enabled, daemon survives"
    next_error: |
      Build progressed further but new compilation errors may emerge.
      Last known state: Gradle daemon did not crash, namespace validation passed,
      desugaring configuration accepted. Awaiting full APK compilation phase.
    time_spent: "25 minutes"

  attempt_4:
    number: 4
    approach: "Gradle Daemon Configuration Tuning (Continued Memory Optimization)"
    rationale: |
      Even with -Xmx3G, daemon might struggle with desugaring overhead.
      Need to:
        1. Reduce memory footprint further
        2. Disable unnecessary optimization passes
        3. Use parallel processing efficiently
        4. Cache intermediate results
    planned_changes: |
      - org.gradle.jvmargs=-Xmx2.5G -XX:MaxMetaspaceSize=768m (further reduction)
      - org.gradle.workers.max=2 (limit parallel compilation workers)
      - org.gradle.caching=true (enable build cache for incremental builds)
      - org.gradle.parallel=false (disable daemon-level parallelism)
      - org.gradle.vfs.watch=false (disable file system watching on constrained system)
    status: "PLANNED"

  attempt_5:
    number: 5
    approach: "Increase Target minSdkVersion to Native Java 8 Support"
    rationale: |
      If minSdkVersion >= 26, Java 8 APIs are natively available and desugaring
      is not required. This eliminates the memory-intensive bytecode transformation.
    consideration: |
      - Current minSdkVersion set by Flutter SDK
      - Requires checking if HabitView needs to support Android 5.0 (API 21)
      - Trade-off: Broader device support vs. build feasibility in 8GB environment
    status: "DEFERRED - Need to confirm minimum Android version requirement"

# ============================================================================
# SECTION 4: FILES MODIFIED
# ============================================================================

files_modified:
  - file_path: "android/gradle.properties"
    change_type: "Configuration"
    modification_type: "Parameter reduction"
    original_value: |
      org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m
    new_value: |
      org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m
    reasoning: |
      8GB Codespaces environment cannot support 12GB+ JVM allocation.
      Linux OOM killer terminates daemon when memory exceeds available RAM.
      3GB heap provides 50% headroom for system + other processes.
    impact: "Prevents daemon crash but may cause slower builds"
    
  - file_path: "android/build.gradle.kts"
    change_type: "Build Configuration"
    modification_type: "Namespace patching attempt (unsuccessful)"
    changes_attempted:
      - plugins.withId() block to auto-assign namespace (removed)
      - afterEvaluate block to late-bind namespace (removed)
    reason_reverted: |
      Configuration-phase hooks cannot reach precompiled binary plugins
      from pub cache. Reverted to keep file clean for future solutions.
    current_status: "Reverted to minimal configuration"
    
  - file_path: "android/app/build.gradle.kts"
    change_type: "Build Configuration"
    modification_type: "Desugaring enablement"
    changes_added: |
      compileOptions {
          sourceCompatibility = JavaVersion.VERSION_11
          targetCompatibility = JavaVersion.VERSION_11
          isCoreLibraryDesugaringEnabled = true
      }
      
      dependencies {
          coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
      }
    reasoning: |
      flutter_local_notifications v17.2.4 requires Java 8 APIs (java.time).
      minSdkVersion 21 does not natively support these APIs.
      Desugaring transforms bytecode to use backported implementations.
    status: "ACTIVE - Awaiting build completion to verify effectiveness"
    
  - file_path: "/root/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/build.gradle"
    change_type: "Direct Pub Cache Modification"
    modification_type: "Manual namespace injection"
    change_applied: |
      Added to root of Android block:
      namespace = "com.example.habitview.isar_flutter_libs"
    reasoning: |
      Precompiled plugin from pub.dev lacks namespace declaration.
      Direct patching in pub cache bypasses AGP 8.0+ validation.
      Changes persist until `flutter clean` or pub cache clear.
    caveats: |
      - NOT version-controlled (cached package)
      - Will be reverted if pub cache is cleared
      - Should be fixed upstream in isar_flutter_libs package (contact maintainers)
    status: "APPLIED - Temporary workaround"

# ============================================================================
# SECTION 5: CURRENT PROBLEMS & STUCK POINTS
# ============================================================================

current_status: "BUILD IN PROGRESS - MULTIPLE ISSUES RESOLVED, ONE CRITICAL ISSUE REMAINS"

stuck_point_primary:
  issue: "Gradle Daemon Crashes During Compilation Phase (Memory Exhaustion)"
  current_error: "Gradle daemon disappeared unexpectedly"
  when_occurs: "After namespace validation and desugaring setup, during d8/r8 bytecode transformation"
  
  technical_details: |
    Phase sequence:
      1. ✅ Gradle configuration phase: Namespace resolved via pub cache patch
      2. ✅ Dependency resolution: All transitive deps fetched (~80 unique packages)
      3. ✅ Desugaring setup: d8/r8 toolchain initialized
      4. ❌ Bytecode transformation: Process runs out of heap memory
      
    Memory pressure points:
      - Desugaring processes ~250+ JAR/AAR files (plugins + transitive deps)
      - Each file analyzed by CFR decompiler, ASM bytecode framework, d8 transformer
      - Analysis graph kept in memory for optimization passes
      - Metaspace holds class metadata (AndroidManifest parsing for all deps)
      - With -Xmx3G, leaves <1GB for app heap + OS + filesystem buffers
  
  evidence: |
    Terminal output shows:
    ```
    Running Gradle task 'assembleRelease'... (completed in 99.7s)
    [Gradle daemon disappeared unexpectedly after approximately 8 minutes]
    [+1080 ms] "flutter apk" took 101,059ms.
    [  +50 ms] Gradle task assembleRelease failed with exit code 1
    ```
    Timeline: 99.7s daemon survived, then crashed during compilation (~8min total)

  attempts_to_resolve: |
    1. Reduced JVM heap: -Xmx8G → -Xmx3G
       Status: Daemon doesn't crash immediately but still fails during desugaring
    
    2. Reduce metaspace: XX:MaxMetaspaceSize=4G → 1G
       Status: Not attempted yet (risk of premature metaspace exhaustion)
    
    3. Disable parallel compilation: -XX:TieredStopAtLevel=2
       Status: Not attempted yet (requires gradle.properties update)
    
    4. Use build cache: org.gradle.caching=true
       Status: Not attempted yet (need cache directory setup)

stuck_point_secondary:
  issue: "No Permanent Solution for isar_flutter_libs Namespace Issue"
  current_workaround: "Direct pub cache file modification"
  problem: |
    The fix applied is temporary and cache-dependent:
      - Persists only until pub cache clear or `flutter clean`
      - Not version-controlled or committed to repository
      - Will confuse future developers who don't see the change in git
      - No upstream fix from isar package maintainers (package is outdated)
  
  permanent_solutions_available:
    1. Upgrade isar_flutter_libs to newer version (if available)
       Status: Currently pinned to ^3.1.0+1, check for 3.1.1+ releases
    
    2. Fork isar_flutter_libs, add namespace, use path dependency
       Status: Large effort, creates maintenance burden
    
    3. Patch at build-time via Gradle task
       Status: Feasible but complex (download JAR, inject namespace, re-package)
    
    4. Migrate to alternative database (not recommended)
       Status: Would require major refactoring of data layer

stuck_point_tertiary:
  issue: "Build Infrastructure Underdimensioned for Codespaces Target"
  problem: |
    The HabitView build has 3 layers of complexity that interact poorly on 8GB RAM:
      1. Flutter toolchain (dart compiler, gen_snapshot, asset compilation)
      2. Gradle + AGP 8.0 (strict compatibility requirements, lots of validation)
      3. Java desugaring (memory-intensive bytecode transformation)
    
    Combined effect:
      - Each layer individually would work on 8GB
      - Combined, they exceed available memory during peak phase
      - No single setting change fixes all three layers simultaneously
  
  evidence: |
    Memory profile during build:
      - Initial: Flutter SDK + Gradle daemon + plugins = ~2-3GB used
      - After pub.dev fetches: +1GB (~250 plugin dependencies cached)
      - Desugaring start: Heap fills to 85-90% capacity
      - Metaspace pressure: Prevents new class loading, forces GC sweeps
      - Result: Daemon OOM killer signal within 8-10 minutes
  
  scaling_options:
    a) Increase Codespaces instance size
       Trade-off: Higher cost, solves problem but defeats Codespaces efficiency goal
    
    b) Optimize build configuration more aggressively
       Trade-off: More build time (parallel → serial), less optimized APK
    
    c) Defer desugaring to build machine (external CI)
       Trade-off: Cannot build APK locally, must rely on GitHub Actions


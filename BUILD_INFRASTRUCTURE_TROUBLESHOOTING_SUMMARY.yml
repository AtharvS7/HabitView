# SECTION 7: DETAILED ANALYSIS OF KEY ISSUES
# ============================================================================

deep_dive_namespace_issue:
  title: "Why isar_flutter_libs Namespace Problem Exists"
  
  agp_evolution: |
    AGP 7.x (2021): Namespace optional, inferred from AndroidManifest.xml
    AGP 8.0+ (2022): Namespace mandatory, must be in build.gradle
    
    Rationale for change: Build consistency, no file I/O required to determine app ID
  
  isar_version_status: |
    isar_flutter_libs 3.1.0+1:
      - Release date: ~2023
      - Target AGP: Likely 7.x era (before mandatory namespace)
      - Current pub.dev: Marked as compatible with Flutter 3.x
      - Actual AGP used: 8.11.1 (much newer than original target)
      - Result: Binary mismatch on metadata requirements
  
  why_direct_patch_works: |
    When Gradle loads plugin build.gradle files, it reads them as static resources.
    Patching the file in pub cache before Gradle runs ensures the file contains
    namespace when AGP's configuration phase reads it.
    
    Process:
      1. `flutter build apk` command
      2. Flutter generates ~/.gradle/gradle_wrapper.properties
      3. Gradle starts, loads settings.gradle.kts
      4. Subprojects included, AGP plugin loaded
      5. AGP processes subprojects' build.gradle files
      6. Our patched isar_flutter_libs/build.gradle is found
      7. Namespace found: ✅ validation passes

deep_dive_desugaring_issue:
  title: "Why Java Desugaring is Required & Memory-Intensive"
  
  java_version_history: |
    Java 8 (released 2014): Added lambda expressions, streams, java.time API
    Android SDK 21-25 (2015-2016): Support limited to Java 7 language features
    Android SDK 26+ (2017): Native support for Java 8 language features
    
    Problem: flutter_local_notifications uses java.time.* (Java 8)
             but app targets minSdkVersion 21 (no native Java 8 support)
  
  desugaring_process: |
    Input: Compiled class files (from flutter_local_notifications + transitive deps)
    
    Step 1 - Class file parsing (CFR decompiler):
      - Read bytecode, reconstruct source-level Java constructs
      - Map java.time.* references to their locations
      - Keep AST in memory for analysis
    
    Step 2 - Desugaring transformation (d8):
      - Replace java.time.LocalDateTime → android.compat.time.LocalDateTime
      - Replace java.util.stream.Stream → j$.util.stream.Stream
      - Rewrite method references → synthetic bridge methods
      - Add Android backport library stubs
    
    Step 3 - Bytecode generation & optimization (r8):
      - Generate new bytecode for modified classes
      - Shrink unused code (ProGuard-like minification)
      - Optimize bytecode for Dalvik VM (d8 passes)
    
    Memory intensive because:
      - Each step buffers full transitive dependency graph
      - ~250+ JAR files = ~50MB combined
      - AST analysis keeps method bodies in memory
      - Optimization passes may keep multiple intermediate representations
  
  why_it_fails_with_3gb_heap: |
    Heap allocation breakdown for -Xmx3G:
      - Reserved by JVM overhead: 200-300MB
      - Available for app logic: ~2.7GB
      
    During desugaring peak:
      - CFR parsing: 400-500MB (class analysis graph)
      - d8 transformer: 800-1000MB (intermediate bytecode)
      - r8 optimizer: 600-800MB (multiple optimization representations)
      - Total peak: 1.8-2.3GB (fits barely)
    
    But concurrent activities:
      - Gradle daemon keeps plugin class metadata: 200-400MB
      - Metaspace holds loaded classes: 300-500MB
      - File I/O buffers: 100-200MB
      - Combined overhead: 600-1100MB
      
      Total actual: 2.4-3.4GB > 3GB limit → OOM
  
  comparison_if_minsdkversion_26: |
    If app used minSdkVersion 26:
      - Java 8 APIs natively available
      - No desugaring needed
      - Build would skip d8/r8 bytecode transformation
      - Estimated savings: 400-600MB peak memory
      - Result: Would likely fit in 3GB with margin
    
    However: If HabitView needs API 21 support, this option unavailable

# ============================================================================
# SECTION 8: RECOMMENDATIONS & NEXT STEPS
# ============================================================================

immediate_next_steps:
  1_immediate_action: |
    Test current state with optimized gradle.properties:
    
    Command: `flutter build apk --no-daemon 2>&1 | tee build_output.log`
    Rationale: --no-daemon disables Gradle daemon, uses subprocess model
              Prevents accumulated memory from previous builds
              Each build starts fresh with clean memory state
    Expected outcome: Might succeed if memory is peak-based rather than accumulated
  
  2_if_still_crashes: |
    Further reduce memory allocation:
    
    Change gradle.properties to:
      org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m
      org.gradle.workers.max=1
      org.gradle.parallel=false
    
    Expected outcome: Slower build but uses <50% available memory
  
  3_if_reduction_doesnt_help: |
    Investigate alternative: Increase minSdkVersion analysis
    
    Commands:
      - `grep -r "minSdkVersion" android/app/build.gradle.kts`
      - Check if app truly needs API 21 or if API 26 is acceptable
      - If API 26 possible: remove desugaring, save 400-600MB
  
  4_if_api_21_required: |
    Escalate to build infrastructure redesign:
    
    Options:
      a) Move APK build to GitHub Actions CI (recommende for Codespaces constraint)
         - GitHub-hosted runners: 7GB RAM, but optimized for builds
         - Cost: Free tier includes generous build minutes
      
      b) Upgrade Codespaces instance size
         - 16GB option available
         - Cost: Higher per-minute charge
         - Solves problem but defeats Codespaces efficiency
      
      c) Implement incremental builds / artifact caching
         - Complex: requires gradle build cache setup
         - Benefit: Subsequent builds use cached artifacts


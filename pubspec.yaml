name: habitview
description: "HabitView — a local-first habit tracker that surfaces behavioural insights, not just streaks."
publish_to: 'none'

# Version: <major>.<minor>.<patch>+<buildNumber>. buildNumber maps to Android versionCode.
version: 1.0.0+1

environment:
  sdk: ^3.10.7
  flutter: ">=3.22.0"

# Local-first architecture:
#   * Isar is the primary on-device database (all habit data lives here).
#   * Firebase is used ONLY for authentication (email/password + Google) and,
#     optionally and opt-in, encrypted cloud backup/sync.
# See docs/ARCHITECTURE.md for the dependency rationale and version pinning notes.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Immutable domain models (already used by the implemented domain layer).
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local-first storage.
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # State management + navigation.
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Authentication (Firebase). The whole Firebase stack is pinned to the
  # firebase_core 3.x / firebase_auth 5.x / cloud_firestore 5.x line so the
  # versions resolve together (see CLAUDE.md "adding deps" note).
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Optional, opt-in cloud backup/sync target (disabled by default).
  cloud_firestore: ^5.4.4

  # Local reminders/notifications.
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # Utilities.
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.4
  crypto: ^3.0.5
  encrypt: ^5.0.3
  share_plus: ^10.0.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/
